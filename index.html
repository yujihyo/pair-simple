<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pair Simple</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <h1 class="toolbar-title">Pair Simple</h1>
      <button type="button" id="export-btn" class="export-btn">
        이미지로 저장
      </button>
    </header>

    <main id="capture-area" class="layout">
      <section class="column profile-column" data-column="a">
        <div class="profile-header">
          <div
            class="editable name"
            contenteditable="true"
            spellcheck="false"
            data-placeholder="이름A"
          >
            이름A
          </div>
          <div
            class="editable description"
            contenteditable="true"
            spellcheck="false"
            data-placeholder="신체정보(나이성별등) / 두줄정도의분량"
          >
            신체정보(나이성별등) / 두줄정도의분량
          </div>
        </div>

        <label class="image-slot image-slot--light">
          <input type="file" accept="image/*" hidden />
          <img alt="" />
          <span class="image-slot-label">사진 업로드</span>
        </label>

        <div class="middle-row">
          <div class="emphasis-block">
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
          </div>
          <div class="circle-grid">
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
          </div>
        </div>

        <div class="check-group" data-check-group="profile-a">
          <p class="check-heading">체크</p>
          <ul class="check-list">
            <li>
              <button type="button" class="check-option" data-value="designated-outfit">
                <span class="check-box" aria-hidden="true"></span>
                지정 의상으로 부탁드립니다
              </button>
            </li>
            <li>
              <button type="button" class="check-option" data-value="omakase-outfit">
                <span class="check-box" aria-hidden="true"></span>
                오마카세 부탁드립니다
              </button>
            </li>
          </ul>
        </div>

        <label class="image-slot image-slot--dark">
          <input type="file" accept="image/*" hidden />
          <img alt="" />
          <span class="image-slot-label">사진 업로드</span>
        </label>
      </section>

      <section class="column profile-column" data-column="b">
        <div class="profile-header">
          <div
            class="editable name"
            contenteditable="true"
            spellcheck="false"
            data-placeholder="이름B"
          >
            이름B
          </div>
          <div
            class="editable description"
            contenteditable="true"
            spellcheck="false"
            data-placeholder="신체정보(나이성별등) / 두줄정도의분량"
          >
            신체정보(나이성별등) / 두줄정도의분량
          </div>
        </div>

        <label class="image-slot image-slot--light">
          <input type="file" accept="image/*" hidden />
          <img alt="" />
          <span class="image-slot-label">사진 업로드</span>
        </label>

        <div class="middle-row">
          <div class="emphasis-block">
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
            <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
              강조할점
            </div>
          </div>
          <div class="circle-grid">
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
            <label class="image-slot image-slot--circle">
              <input type="file" accept="image/*" hidden />
              <img alt="" />
            </label>
          </div>
        </div>

        <div class="check-group" data-check-group="profile-b">
          <p class="check-heading">체크</p>
          <ul class="check-list">
            <li>
              <button type="button" class="check-option" data-value="designated-outfit">
                <span class="check-box" aria-hidden="true"></span>
                지정 의상으로 부탁드립니다
              </button>
            </li>
            <li>
              <button type="button" class="check-option" data-value="omakase-outfit">
                <span class="check-box" aria-hidden="true"></span>
                오마카세 부탁드립니다
              </button>
            </li>
          </ul>
        </div>

        <label class="image-slot image-slot--dark">
          <input type="file" accept="image/*" hidden />
          <img alt="" />
          <span class="image-slot-label">사진 업로드</span>
        </label>
      </section>

      <section class="column reference-column">
        <div class="check-group check-group--large" data-check-group="reference">
          <p class="check-heading check-heading--large">체크</p>
          <ul class="check-list check-list--large">
            <li>
              <button type="button" class="check-option" data-value="designated-composition">
                <span class="check-box" aria-hidden="true"></span>
                지정 구도로 부탁드립니다
              </button>
            </li>
            <li>
              <button type="button" class="check-option" data-value="reference-modify">
                <span class="check-box" aria-hidden="true"></span>
                참고하여 적당히 변형해주세요
              </button>
            </li>
            <li>
              <button type="button" class="check-option" data-value="omakase-composition">
                <span class="check-box" aria-hidden="true"></span>
                오마카세 부탁드립니다
              </button>
            </li>
          </ul>
        </div>

        <label class="image-slot image-slot--green">
          <input type="file" accept="image/*" hidden />
          <img alt="" />
          <span class="image-slot-label">사진 업로드</span>
        </label>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
