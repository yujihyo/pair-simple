<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pair Simple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="control-panel" aria-label="관리 패널">
      <div class="control-panel-inner">
        <header class="control-panel-header">
          <h2 class="control-panel-title">편집</h2>
          <p class="control-panel-desc">문의 @mayoraship</p>
        </header>

        <section class="control-section">
          <h3 class="control-section-title">캐릭터 1</h3>
          <ul class="control-list">
            <li class="control-item">
              <span class="control-label">외형</span>
              <label class="upload-btn">
                <input id="upload-head-a" type="file" accept="image/*" data-slot="head-a" hidden />
                <span class="upload-btn-icon" aria-hidden="true">+</span>
                <span class="upload-btn-text">사진 선택</span>
              </label>
              <span class="control-preview" data-preview="head-a"></span>
            </li>
            <li class="control-item">
              <span class="control-label">의상</span>
              <label class="upload-btn">
                <input id="upload-outfit-a" type="file" accept="image/*" data-slot="outfit-a" hidden />
                <span class="upload-btn-icon" aria-hidden="true">+</span>
                <span class="upload-btn-text">사진 선택</span>
              </label>
              <span class="control-preview" data-preview="outfit-a"></span>
            </li>
            <div class="color-group">
              <p class="color-group-label">머리/눈/피부/테마</p>
              <div class="color-picker-row">
                <label class="color-swatch" title="색상 1">
                  <input type="color" value="#a3a3a3" data-slot="color-b-1" />
                  <span class="color-swatch-ring"></span>
                </label>
                <label class="color-swatch" title="색상 2">
                  <input type="color" value="#a3a3a3" data-slot="color-b-2" />
                  <span class="color-swatch-ring"></span>
                </label>
                <label class="color-swatch" title="색상 3">
                  <input type="color" value="#a3a3a3" data-slot="color-b-3" />
                  <span class="color-swatch-ring"></span>
                </label>
                <label class="color-swatch" title="색상 4">
                  <input type="color" value="#a3a3a3" data-slot="color-b-4" />
                  <span class="color-swatch-ring"></span>
                </label>
              </div>
            </div>
          </ul>
        </section>

        <section class="control-section">
          <h3 class="control-section-title">캐릭터 2</h3>
          <ul class="control-list">
            <li class="control-item">
              <span class="control-label">외형</span>
              <label class="upload-btn">
                <input id="upload-head-a" type="file" accept="image/*" data-slot="head-a" hidden />
                <span class="upload-btn-icon" aria-hidden="true">+</span>
                <span class="upload-btn-text">사진 선택</span>
              </label>
              <span class="control-preview" data-preview="head-a"></span>
            </li>
            <li class="control-item">
              <span class="control-label">의상</span>
              <label class="upload-btn">
                <input id="upload-outfit-a" type="file" accept="image/*" data-slot="outfit-a" hidden />
                <span class="upload-btn-icon" aria-hidden="true">+</span>
                <span class="upload-btn-text">사진 선택</span>
              </label>
              <span class="control-preview" data-preview="outfit-a"></span>
            </li>
            <div class="color-group">
              <p class="color-group-label">머리/눈/피부/테마</p>
              <div class="color-picker-row">
                <label class="color-swatch" title="색상 1">
                  <input type="color" value="#a3a3a3" data-slot="color-b-1" />
                  <span class="color-swatch-ring"></span>
                </label>
                <label class="color-swatch" title="색상 2">
                  <input type="color" value="#a3a3a3" data-slot="color-b-2" />
                  <span class="color-swatch-ring"></span>
                </label>
                <label class="color-swatch" title="색상 3">
                  <input type="color" value="#a3a3a3" data-slot="color-b-3" />
                  <span class="color-swatch-ring"></span>
                </label>
                <label class="color-swatch" title="색상 4">
                  <input type="color" value="#a3a3a3" data-slot="color-b-4" />
                  <span class="color-swatch-ring"></span>
                </label>
              </div>
            </div>
          </ul>
        </section>

        <section class="control-section">
          <h3 class="control-section-title">페어</h3>
          <ul class="control-list">
            <li class="control-item">
              <span class="control-label">구도</span>
              <label class="upload-btn">
                <input id="upload-reference" type="file" accept="image/*" data-slot="reference" hidden />
                <span class="upload-btn-icon" aria-hidden="true">+</span>
                <span class="upload-btn-text">사진 선택</span>
              </label>
              <span class="control-preview" data-preview="reference">미업로드</span>
            </li>
          </ul>
        </section>

        <div class="control-panel-footer">
          <button type="button" id="export-btn" class="export-btn">
            <span class="export-btn-label">이미지로 저장</span>
          </button>
        </div>
      </div>
    </aside>

    <div class="workspace">
      <main id="capture-area" class="layout">
        <section class="column profile-column" data-column="a">
          <div class="profile-header">
            <div class="editable name" contenteditable="true" spellcheck="false" data-placeholder="이름A">
              캐릭터1
            </div>
            <div class="editable description" contenteditable="true" spellcheck="false"
              data-placeholder="신체정보(나이성별등) / 두줄정도의분량">
              나이성별키등적는곳<br>두줄까지가능합니다
            </div>
          </div>

          <div class="image-slot image-slot--light" data-slot="head-a">
            <img alt="" />
            <div class="circle-grid">
              <div class="color-circle" data-slot="color-a-1"></div>
              <div class="color-circle" data-slot="color-a-2"></div>
              <div class="color-circle" data-slot="color-a-3"></div>
              <div class="color-circle" data-slot="color-a-4"></div>
            </div>
          </div>

          <div class="middle-row">
            <div class="emphasis-block">
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
            </div>
          </div>

          <div class="check-group" data-check-group="profile-a">
            <p class="check-heading">의상</p>
            <ul class="check-list">
              <li>
                <button type="button" class="check-option" data-value="designated-outfit" data-shows="outfit-a">
                  <span class="check-box" aria-hidden="true"></span>
                  지정의상
                </button>
              </li>
              <li>
                <button type="button" class="check-option" data-value="omakase-outfit" data-hides="outfit-a">
                  <span class="check-box" aria-hidden="true"></span>
                  오마카세
                </button>
              </li>
            </ul>
          </div>

          <div class="slot-wrapper" data-slot-wrapper="outfit-a">
            <div class="image-slot image-slot--dark" data-slot="outfit-a">
              <img draggable="false">
              <div class="resize-handle-y"></div>
            </div>
          </div>
        </section>

        <section class="column profile-column" data-column="b">
          <div class="profile-header">
            <div class="editable name" contenteditable="true" spellcheck="false" data-placeholder="이름B">
              캐릭터2
            </div>
            <div class="editable description" contenteditable="true" spellcheck="false"
              data-placeholder="신체정보(나이성별등) / 두줄정도의분량">
              나이성별키등적는곳<br>두줄까지가능합니다
            </div>
          </div>

          <div class="image-slot image-slot--light" data-slot="head-b">
            <img alt="" />
            <div class="circle-grid">
              <div class="color-circle" data-slot="color-a-1"></div>
              <div class="color-circle" data-slot="color-a-2"></div>
              <div class="color-circle" data-slot="color-a-3"></div>
              <div class="color-circle" data-slot="color-a-4"></div>
            </div>
          </div>

          <div class="middle-row">
            <div class="emphasis-block">
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
              <div class="editable emphasis-line" contenteditable="true" spellcheck="false">
                강조할점
              </div>
            </div>
          </div>

          <div class="check-group" data-check-group="profile-b">
            <p class="check-heading">의상</p>
            <ul class="check-list">
              <li>
                <button type="button" class="check-option" data-value="designated-outfit" data-shows="outfit-b">
                  <span class="check-box" aria-hidden="true"></span>
                  지정의상
                </button>
              </li>
              <li>
                <button type="button" class="check-option" data-value="omakase-outfit" data-hides="outfit-b">
                  <span class="check-box" aria-hidden="true"></span>
                  오마카세
                </button>
              </li>
            </ul>
          </div>

          <div class="slot-wrapper" data-slot-wrapper="outfit-b">
            <div class="image-slot image-slot--dark" data-slot="outfit-b">
              <img draggable="false">
              <div class="resize-handle-y"></div>
            </div>
          </div>
        </section>

        <section class="column reference-column">
          <div class="check-group check-group--large" data-check-group="reference">
            <p class="check-heading check-heading--large">구도</p>
            <ul class="check-list check-list--large">
              <li>
                <button type="button" class="check-option" data-value="designated-composition" data-shows="reference">
                  <span class="check-box" aria-hidden="true"></span>
                  지정구도(변형X)
                </button>
              </li>
              <li>
                <button type="button" class="check-option" data-value="reference-modify" data-shows="reference">
                  <span class="check-box" aria-hidden="true"></span>
                  참고구도(변형O)
                </button>
              </li>
              <li>
                <button type="button" class="check-option" data-value="omakase-composition" data-hides="reference">
                  <span class="check-box" aria-hidden="true"></span>
                  오마카세
                </button>
              </li>
            </ul>
          </div>

          <div class="slot-wrapper slot-wrapper--grow" data-slot-wrapper="reference">
            <div class="image-slot image-slot--green" data-slot="reference">
              <img draggable="false">
              <div class="resize-handle-xy"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
